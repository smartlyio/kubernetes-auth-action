name: Build

on: workflow_call

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .node-version
    - name: "Install"
      run: npm install
    - name: "Prettier"
      run: npm run format-check
    - name: "Lint"
      run: npm run lint
    - name: "Test"
      run: npm run test
    - name: "build"
      run: |
        npm run build
        npm run package

  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .node-version
    - name: "Build action for test"
      run: |
        npm install
        npm run all
        git clean -fXd
    - name: Test executing the action
      uses: ./
      env:
        KUBERNETES_AUTH_TOKEN: test
      with: 
        kubernetesServer: testServer
        kubernetesContext: testContext
        kubernetesNamespace: testNamespace
        kubernetesClusterDomain: cluster.local

  release:
    runs-on: ubuntu-24.04
    name: "Build and release action"
    needs: [build, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Configure git
        uses: smartlyio/github-actions@4ef49912877febb62867891d42a1205190fb2ab0 # git-init-userinfo-v1
      - name: Release flow
        uses: smartlyio/github-actions@ac9cc7e148b55d6c88641ea387ab6d2860ba5c3e # release-action-node-v1
        with:
          dry_run: ${{ github.event_name == 'pull_request' }}
          token: "${{ secrets.GITHUB_TOKEN }}"
